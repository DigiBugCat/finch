# GoReleaser config for the finch agent.
#
# The agent is a Go module under agent/ (not the repo root), so the build runs
# with `dir: agent`. On a tag push the release workflow cross-compiles every
# target (darwin/linux × amd64/arm64, plus linux armv6/armv7 for 32-bit Pis) and
# uploads RAW binaries named exactly `finch-<os>-<arch>` to GitHub
# Releases — which is what the installer (`$HUB/releases/finch-${os}-${arch}`)
# and the worker /releases redirect resolve to.
#
#   tag v1.4.0  ->  stamps -X .../agent/core.agentVersion=1.4.0 (matches the literal
#                   scripts/check-versions.mjs keeps in sync across all three files)
version: 2

project_name: finch

builds:
  - id: finch
    dir: agent
    main: .
    binary: finch
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
      - arm
    # 32-bit ARM variants: armv6 covers the Pi Zero / Pi 1 (uname -m = armv6l),
    # armv7 covers the Pi 2 / Pi 3 in 32-bit mode (armv7l). 64-bit Pis use arm64.
    goarm:
      - "6"
      - "7"
    ignore:
      # No 32-bit ARM macOS target exists.
      - goos: darwin
        goarch: arm
    ldflags:
      - -s -w -X github.com/digibugcat/finch/agent/core.agentVersion={{ .Version }}

archives:
  # Serve un-tarred binaries named exactly finch-<os>-<arch> so the installer's
  # URL and the worker /releases redirect download a runnable binary directly.
  - id: raw
    format: binary
    # `.Arm` is set only for goarch=arm (6/7), so 32-bit builds become
    # finch-linux-armv6 / finch-linux-armv7 while amd64/arm64 keep their plain
    # finch-<os>-<arch> names. The installer maps uname -m (armv6l/armv7l) to these.
    name_template: "finch-{{ .Os }}-{{ .Arch }}{{ if .Arm }}v{{ .Arm }}{{ end }}"

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

release:
  draft: false
  prerelease: auto

changelog:
  use: github
