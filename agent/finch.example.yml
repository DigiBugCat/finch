# finch.yml — a box's manifest (cloudflared-style).
#
# One `finch run` reads this and serves every ingress rule from a single process:
# each rule forwards a local service out to the hub (no open ports). finch is a
# protocol-agnostic tunnel — point a rule at an MCP server, a website, or any
# HTTP/WebSocket app. Copy to `finch.yml` and run `finch run`.
#
# This file holds NO secrets. Enroll each app once (writes a credential to
# credentials-dir), then it resumes ticketless on every run:
#
#   finch enroll printer --ticket <ticket-from-dashboard>
#   finch run

hub: https://finchmcp.com        # the finch hub (default; omit for prod)
box: mac-mini                # this box's name (default: hostname)
credentials-dir: ~/.finch        # where `finch enroll` writes per-app credentials

# Each rule forwards one local service:
#   app_path    — the public URL segment AND the service you enrolled.
#                 Public URL: https://<your-slug>.finchmcp.com/<app_path>/…
#   service     — the local server to forward to. By default finch confines a rule
#                 to /mcp (it's an MCP tunnel first); add a base path (…:8000/mcp)
#                 to confine to a different subtree.
#   forward_all — set true to forward the WHOLE /<app_path>/* subtree instead of
#                 just /mcp — for a website or any non-MCP HTTP app.
ingress:
  - app_path: printer
    service: http://127.0.0.1:8000
  - app_path: www
    service: http://127.0.0.1:3000
    forward_all: true
