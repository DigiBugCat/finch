# finch.toml — a box's manifest (cloudflared-style).
#
# One `finch run` reads this and serves every [[ingress]] rule from a single
# process: each rule exposes a local service as its own finch appliance, dialing
# OUT to the hub (no open ports). Copy to `finch.toml`, fill in real tickets
# (mint one per appliance in the dashboard → Add device), and run `finch run`.

hub     = "https://finchmcp.com"   # the finch hub (default; omit for prod)
machine = "mac-mini"               # this box's name (default: hostname)
state   = "~/.finch"               # dir for per-appliance refresh credentials

# Each rule exposes one application:
#   name    — friendly label for the application (logs/your reference)
#   path    — the public URL segment AND the appliance enrolled in the dashboard
#   service — the local server finch forwards to
# Full endpoint:  https://<your-slug>.finchmcp.com/<path>/mcp
[[ingress]]
name    = "Label Printer"
path    = "printer"
service = "http://127.0.0.1:8000"
ticket  = "REPLACE_WITH_PRINTER_TICKET"     # first run only; then state resumes

[[ingress]]
name    = "Transcriber"
path    = "transcribe"
service = "http://127.0.0.1:8001"
ticket  = "REPLACE_WITH_TRANSCRIBE_TICKET"
