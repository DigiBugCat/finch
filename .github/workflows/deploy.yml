name: deploy

# Continuous delivery for the hub (worker/) + dashboard (web/).
#
#   push to main        → deploy STAGING   (finch-staging / finch-web-staging)
#   push a v* git tag   → deploy PRODUCTION (finch-prod    / finch-web-prod)
#
# The hub is deployed BEFORE the web in each env: web's FINCH_HUB service
# binding targets the matching hub Worker, which must already exist.
#
# Runtime secrets (FINCH_SERVICE_SECRET, TICKET_SECRET, CLERK_SECRET_KEY) are
# NOT managed here — they are set once per env with `wrangler secret put` and
# persist on the Worker across deploys. This pipeline only ships code + config.
#
# Required repo/environment config:
#   secrets: CLOUDFLARE_API_TOKEN, CLOUDFLARE_ACCOUNT_ID
#   vars:    NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY  (pk_test_… staging / pk_live_… prod)
# Production is a protected GitHub Environment (require a reviewer) so a tag
# can't ship to prod without a human click.

on:
  push:
    branches: [main]
    tags: ["v*"]

permissions:
  contents: read

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  target:
    # Resolve which env this ref deploys to (tag → production, main → staging).
    runs-on: ubuntu-latest
    outputs:
      env: ${{ steps.pick.outputs.env }}
    steps:
      - id: pick
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "env=production" >> "$GITHUB_OUTPUT"
          else
            echo "env=staging" >> "$GITHUB_OUTPUT"
          fi

  hub:
    needs: target
    runs-on: ubuntu-latest
    environment: ${{ needs.target.outputs.env }}
    defaults:
      run:
        working-directory: worker
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: worker/package-lock.json
      - run: npm ci
      - run: npm test
      # preflight (in the deploy script) blocks shipping dev secrets / a
      # fail-open prod tenant before wrangler ever runs.
      - run: npm run deploy${{ needs.target.outputs.env == 'staging' && ':staging' || '' }}

  web:
    needs: [target, hub]
    runs-on: ubuntu-latest
    environment: ${{ needs.target.outputs.env }}
    defaults:
      run:
        working-directory: web
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      # Baked into the client bundle at build time — must be the env's own
      # Clerk publishable key (pk_test_… for staging, pk_live_… for prod).
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ vars.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm test
      - run: npm run deploy${{ needs.target.outputs.env == 'staging' && ':staging' || '' }}
