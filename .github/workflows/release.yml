name: release

# Cut a release by pushing a tag:  git tag v1.4.0 && git push origin v1.4.0
# GoReleaser cross-compiles the agent (darwin/linux × amd64/arm64, plus linux
# armv6/armv7 for 32-bit Raspberry Pis) and uploads
# raw `finch-<os>-<arch>` binaries + a checksums.txt to the GitHub Release, which
# is what the installer one-liner and the worker /releases redirect fetch.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.4"
          cache-dependency-path: agent/go.sum
      - uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      # Mirror the published binaries into the finch-releases R2 bucket — the
      # hub serves GET /releases/<asset> from it (binding RELEASES). The repo
      # is private, so the GitHub assets are NOT anonymously fetchable; R2 is
      # what the installer and hub-pushed updates actually download.
      # `gh release download` re-fetches the just-published assets so we mirror
      # exactly what shipped (not the local dist/ layout).
      - name: Mirror release binaries to R2
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -eu
          mkdir -p /tmp/release-assets
          gh release download "${GITHUB_REF_NAME}" --dir /tmp/release-assets --clobber
          for f in /tmp/release-assets/*; do
            npx wrangler@4 r2 object put "finch-releases/$(basename "$f")" --file "$f" --remote
          done
