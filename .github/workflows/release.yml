name: release

# Cut a release by pushing a tag:  git tag v1.4.0 && git push origin v1.4.0
# GoReleaser cross-compiles the agent (darwin/linux × amd64/arm64) and uploads
# raw `finch-<os>-<arch>` binaries + a checksums.txt to the GitHub Release, which
# is what the installer one-liner and the worker /releases redirect fetch.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.4"
          cache-dependency-path: agent/go.sum
      - uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
